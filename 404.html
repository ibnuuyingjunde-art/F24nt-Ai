<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - F24nT AI</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            background: #f9f8f6;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            text-align: center;
            max-width: 500px;
        }
        .code {
            font-size: 120px;
            font-weight: 700;
            color: #cf643a;
            line-height: 1;
            margin-bottom: 10px;
        }
        h1 {
            font-size: 28px;
            color: #2a2824;
            margin-bottom: 12px;
        }
        p {
            font-size: 16px;
            color: #827f71;
            margin-bottom: 24px;
            line-height: 1.6;
        }
        a {
            display: inline-block;
            padding: 12px 32px;
            background: #cf643a;
            color: white;
            border-radius: 10px;
            text-decoration: none;
            font-weight: 600;
            transition: background 0.3s;
        }
        a:hover {
            background: #b8542f;
        }
        .logo svg {
            width: 64px;
            height: 64px;
            margin-bottom: 20px;
        }
        .dark {
            display: none;
        }
        @media (prefers-color-scheme: dark) {
            body {
                background: #1c1b18;
            }
            h1 {
                color: #f0eee8;
            }
            p {
                color: #aaa69a;
            }
            .light {
                display: none;
            }
            .dark {
                display: block;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo light">
            <svg viewBox="0 0 100 100" fill="none">
                <circle cx="50" cy="50" r="44" stroke="#cf643a" stroke-width="7" stroke-linecap="round" stroke-dasharray="210 60"/>
                <circle cx="50" cy="50" r="30" stroke="#c35528" stroke-width="5.5" stroke-linecap="round" stroke-dasharray="140 38" opacity=".7"/>
                <circle cx="50" cy="50" r="16" stroke="#cf643a" stroke-width="4" stroke-linecap="round" stroke-dasharray="78 18"/>
                <circle cx="50" cy="50" r="7" fill="#cf643a" opacity=".85"/>
            </svg>
        </div>
        <div class="logo dark">
            <svg viewBox="0 0 100 100" fill="none">
                <circle cx="50" cy="50" r="44" stroke="#cf643a" stroke-width="7" stroke-linecap="round" stroke-dasharray="210 60"/>
                <circle cx="50" cy="50" r="30" stroke="#c35528" stroke-width="5.5" stroke-linecap="round" stroke-dasharray="140 38" opacity=".7"/>
                <circle cx="50" cy="50" r="16" stroke="#cf643a" stroke-width="4" stroke-linecap="round" stroke-dasharray="78 18"/>
                <circle cx="50" cy="50" r="7" fill="#cf643a" opacity=".85"/>
            </svg>
        </div>
        <div class="code">404</div>
        <h1>Halaman Tidak Ditemukan</h1>
        <p>Maaf, halaman yang Anda cari tidak tersedia atau telah dipindahkan.</p>
        <a href="/">Kembali ke Beranda</a>
    </div>
</body>
</html>
